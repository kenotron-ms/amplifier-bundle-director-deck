          Color/tone inference guide (TEXT PROMPT MODE):
          - Executive / formal → dark background, muted palette, neutral sans-serif
          - Consumer / startup → high contrast, energetic accent, modern sans-serif
          - Healthcare / legal → clean light background, trustworthy blues or greens
          - Cultural / food / craft → expressive palette, warm accent, serif display

          ---

          ## Handling revision_instructions (when non-empty)

          Apply them before writing. Common patterns:
          - "make slide 3 punchier" → sharpen the assertion title, tighten bullets,
