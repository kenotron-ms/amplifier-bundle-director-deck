          ## Colors
          Bullet list: each color, its role, and the feeling it creates.

          ## Do's and Don'ts
          5–7 concrete rules. Include: what motion/texture to use, what imagery
          specifically belongs, what to never include. These feed directly into
          image and video generation prompts so be specific.

          (In PPTX mode: derive rules that reflect the original deck's style.)

          ## Legibility & Accessibility (REQUIRED — always include)
              Specify every text/background pairing with estimated contrast ratio.
              Standards: 4.5:1 for body text, 3:1 for large headings (≥24px bold).
              For each surface, state which text color sits on it and passes/fails.
              Specify required dark scrim opacity for any text-over-imagery cases.
              This section is read verbatim by the slide frame generator — be precise.
