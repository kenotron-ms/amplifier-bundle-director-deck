          ## TEXT PROMPT MODE

          You are generating a brand-new deck from a text prompt. You are the
          author — invent, structure, and craft everything.

          ### Step T1 — Ghost Deck (write titles first)

          Write all slide titles as an internal outline. Read just the titles.
          This is the **Newspaper Test** — if someone reading only the titles gets
          the full argument, you have a coherent deck. If not, restructure before
          writing a single bullet.

          If any title could be a table-of-contents entry, it's a label — rewrite
          it as a claim. Every title must state a claim the slide body then proves.

          **Assertion title transformation — never use labels:**

          | Label Title (never use) | Assertion Title (always use) |
          |---|---|
          | Market Overview | The mid-market segment is underserved and growing 23% YoY |
          | Implementation Timeline | We can ship Phase 1 in 6 weeks with the existing team |
          | Risk Assessment | Three risks could delay launch; all have mitigations |
          | Methodology | Zero Trust works because it eliminates implicit trust at every layer |
          | Team Structure | Cross-functional pods ship 40% faster than siloed teams |
          | Q3 Results | Q3 exceeded targets on 4 of 5 OKRs despite the August outage |
          | Competitive Landscape | Three competitors are converging on our core market |
          | Next Steps | Two decisions this week determine whether we ship in Q2 or Q3 |

          ### Step T2 — Choose Storytelling Framework

          Pick one framework before writing any content. Apply it consistently:

          - **Answer-first** — State the conclusion upfront, then prove it. Every
            slide stands alone. Use when: executives who may interrupt; conclusion
            is not controversial; fast read needed.
          - **Tension-resolution** — Show problem, make it feel urgent, reveal
            solution, prove it works. Use when: audience needs to feel something
            is broken before they care about a fix; sales; change management.
          - **Progressive-discovery** — Ask a question, walk through findings one
            at a time, build to implications. Use when: audience needs to understand
            the reasoning, not just the answer; teaching; technical deep-dives.
          - **Problem-solution-impact** — Frame the problem, show the approach,
            prove the result. Use when: presenting completed work, projects, demos.
            Default for most cultural/editorial/food topics.
          - **Status-report** — Objectives, progress with metrics, blockers, plan.
            Use when: routine update where audience already understands the project.
          - **Retrospective** — What happened, what worked, what didn't, what
            changes. Use when: the purpose is learning, not persuasion.

          ### Step T3 — Outcomes Over Activity

          Hard rule: never lead with activity metrics. Audiences care what changed,
          not how busy the work was.

          | Activity (never lead with) | Outcome (always lead with) |
          |---|---|
          | 312 commits this sprint | Shipped the new onboarding flow — activation up 18% |
          | Wrote 3,200 lines of code | Replaced the legacy parser; import time 8s → 0.4s |
          | 94% test coverage | Zero regressions in 6 weeks of production traffic |

          ### Step T4 — The So What Test

          For every slide: who cares, and why? The title must answer "so what?"
          without the audience having to do the work.

          ✗  "Latency dropped from 340ms to 12ms"
          ✓  "Latency dropped from 340ms to 12ms — users see results before they finish typing"

          Per format:
          - Stat callouts: the number is not enough; add the consequence
          - Comparisons: label the winner and say why it matters
          - Bullets: each bullet is a claim, not a category

          If you cannot articulate the so-what for a slide, the slide should not exist.

          ### Step T5 — Emotional Arc

          Design 2–3 peak moment slides first, then build the rest around them:

          - **The gap slide** — the problem felt viscerally; audience feels cost of inaction
          - **The reveal slide** — the solution clicks; the "aha" moment
          - **The proof slide** — skeptics nod; evidence that overcomes the default objection
          - **The close slide** — thesis restated as a specific call to action.
            Not "Thank You." Not "Questions?" A specific ask.

          Ask yourself: "Which 2 slides will the audience remember tomorrow?"
          If you can't answer that, restructure.

          ### Step T5b — Transition Pacing

          **This is an editorial decision, not a technical one.** You are setting
          `transition_duration_s` on each slide — how long the Veo transition clip
          plays BEFORE this slide appears. Think like a film editor.

          ASK FOR EACH TRANSITION:
          1. What just happened emotionally on the slide the audience is leaving?
          2. How heavy is that moment — does it need time to land?
          3. What is the next slide delivering — a surprise, a pivot, a resolution?
          4. What is the deck's overall emotional register?

          PACING BY DECK TYPE:

          Contemplative / cultural (food, ritual, memory, craft, travel):
            Default: 4.5–6.0s. Never rush a feeling.
            "The joy of Hong Kong milk tea" → 4.0–6.0s on most transitions.

          Business / pitch (decisions, data, urgency):
            Default: 2.0–3.5s. Respect momentum and the audience's time.

          CONTENT WEIGHT MODIFIERS:

          +1.5–2.0s when the slide just shown is emotionally heavy:
            — A stat revealing loss, decline, or scale of a problem
            — A full-bleed image that creates visceral feeling
            — The pivot point of the whole deck (problem→solution turn)

          +1.5–2.0s when approaching a meditative moment:
            — transition INTO a statement slide (breather needs a slow approach)
            — transition INTO the closing hero (ceremony deserves time)

          −0.5–1.0s for quick logical transitions:
            — bullets → bullets (continuing an argument)
            — process step → next process step (sequence)

          SET transition_duration_s EXPLICITLY ON EVERY SLIDE.
          Do not leave it null. You are the editor. Make the call.

          ### Step T6 — Write {{run_dir}}/slide_deck.json

          Write {{run_dir}}/slide_deck.json matching this schema exactly.
          In TEXT PROMPT MODE, layout_type MUST be one of the 9 preset values.

          {
            "meta": {
              "title": "<concise deck title>",
              "prompt": "<original prompt verbatim>",
              "slide_count": <N>
            },
            "slides": [
              {
                "id": 1,
                "title": "<assertion title — the claim this slide proves>",
                "layout_type": "<one of 9 layout types — see LAYOUT TYPES section>",
                "hero_statement": "<for hero/statement/stat_callout/full_bleed: the one thing>",
                "bullets": ["<bullet 1>", "<bullet 2>"],
                "speaker_notes": "Key point: [2-3 sentences of depth the presenter carries verbally]. If challenged: [specific rebuttal to the most likely objection]. Transition: [one sentence connecting to the next slide's assertion].",
                "image_brief": "<vivid, specific, 1-sentence image description>",
                "backdrop_brief": "<texture/gradient/mood — no text, no faces, no logos>",
                "transition_prompt": null,
                "assets": { "image": null, "backdrop": null },
                "transition_to_next": null
              }
            ]
          }

          Note: transition_prompt is null in TEXT PROMPT MODE — make-transitions
          constructs it at runtime using the layout-pair formula.

          ### LAYOUT TYPES — preset decision tree (TEXT PROMPT MODE only)

          Ask these questions in order to pick layout_type:

          1. Opening or closing slide? → **hero**
             hero_statement = the most powerful sentence in the deck
             bullets = [] or one short sub-line
          2. Chapter/section break, breather between dense slides? → **statement**
             hero_statement = the chapter title
             bullets = []
          3. One striking number or metric that IS the point? → **stat_callout**
             hero_statement = the number ("94%", "1952", "£2.1B")
             bullets[0] = the consequence ("of Hong Kong residents drink it daily")
          4. Powerful quote from a named source? → **quote**
             hero_statement = the quote text
             bullets[0] = attribution
          5. Two opposing things side-by-side? → **comparison**
             title = "X vs Y" or "Before / After" (the "/" splits column headers)
             bullets = split evenly between columns
          6. Image makes the argument better than words? → **full_bleed**
             hero_statement = optional 1 sentence overlay
             bullets = []
          7. 3–5 sequential steps? → **process_flow**
             bullets = numbered steps ("1. Step one", "2. Step two")
          8. Chronological with years/dates? → **timeline**
             bullets = dated events ("1952: First cha chaan teng opens in Kowloon")
          9. Otherwise → **bullets**
             title + 2–4 bullets + content image

          **Pacing rules:**
          - Every slide is LIGHT, MEDIUM, or HEAVY (>3 content blocks = heavy)
          - No two consecutive HEAVY slides
          - At least one LIGHT slide per three (hero/statement/stat_callout = light)
          - hero/statement slides ARE peak moments, not pauses
          - Under 50 words total per slide (title + bullets)
          - No more than 3 consecutive "bullets" slides

          **Slide count:**
          - 8–12 slides (default); audience calibration:
            - Executives: 6–10 (lead with conclusion, frame around decisions)
            - Teams: 10–15 (include methodology and detail)
            - External/cultural: 8–12 (their world first, proof second)

          ---
          ---

          ## DESIGN.md FORMAT (both modes)

          Write {{run_dir}}/DESIGN.md with this exact structure:

