# =============================================================================
# CHANGELOG
# =============================================================================
#
# v0.2.0 (2026-04-22):
#   - BREAKING CHANGE: Replace unresolvable local-agent references with working
#     foundation:zen-architect steps + direct bash steps
#     * ROOT CAUSE: type:agent steps referencing bare agent names like
#       'ghost-deck-writer' fail at runtime with "Agent not found in
#       configuration" because local project agents/*.md files are NOT
#       auto-discovered by the Amplifier runtime. Only agents registered via
#       a bundle (bundle:agent-name) or placed in ~/.amplifier/agents/ are
#       resolvable by the recipe engine.
#     * FIX — two-pronged approach:
#       1. Deterministic agents (slide-architect, deck-stitcher) — these only
#          run known Python commands; converted to type:bash steps with the
#          exact commands from each agent's documentation inlined. Zero LLM
#          overhead; faster and more reliable.
#       2. LLM-driven agents (ghost-deck-writer, visual-director,
#          transition-director) — converted to type:agent with
#          foundation:zen-architect and the full agent system-prompt +
#          step-by-step instructions from each *.md file inlined in the
#          recipe step prompt. The foundation agent is always resolvable.
#     * NOTE on specialized tools: visual-director needs an image-generation
#       tool (openai_images / gpt_image) and transition-director needs bash
#       (Playwright) + veo. If foundation:zen-architect is not configured with
#       those tools in your session, extend via agent_config or ensure the
#       relevant tool modules are included in the foundation bundle.
#     * RESULT: Recipe no longer fails at agent discovery. All four stages
#       execute; the agent steps use the foundation agent with inlined
#       instructions that reproduce the original local-agent behavior.
#
# v0.3.0 (2026-04-23):
#   SEAMLESS TRANSITION RULES baked into all steps (fixes dimension mismatch
#   that caused a 150px jump when transitions played):
#   - generate-images: size 1536x1024 → 1536x864 (16:9 exact, both × 16)
#   - make-transitions: Playwright viewport 960×540 → 1536×864; prefer pixel
#     slides as keyframes; Veo duration_seconds "8" (required for interpolation)
#   - assemble-deck: replaced broken embed_transitions (<p:video> inside
#     <p:transition> is invalid OOXML) with add_movie() interstitial slides
#   - screenshot_tool.py: width/height now params (default 1536×864)
#   See: docs/SEAMLESS-TRANSITIONS-LESSONS.md
#
# v0.1.1 (2026-04-22):
#   - BUGFIX: init-run-dir bash step fails with "$RECIPE_ENV: ambiguous redirect"
#     * ROOT CAUSE: $RECIPE_ENV is not an Amplifier mechanism — the variable is
#       unset at runtime, so `>> $RECIPE_ENV` becomes an ambiguous redirect.
#     * FIX: Use the correct Amplifier bash-step output mechanism: print the
#       computed path to stdout and declare `output: run_dir` on the step.
#       Amplifier captures stdout and stores it in the named context variable,
#       making {{run_dir}} available to all subsequent steps.
#     * RESULT: run_dir propagates correctly through all four stages.

name: director-deck
version: "0.4.0"
description: >
  Turn a text prompt into a polished PPTX with AI-generated images and
  Veo 3.1 video transitions. Three human review gates ensure aesthetic
  quality at content, visual, and transition checkpoints.

# ---------------------------------------------------------------------------
# Requirements
# ---------------------------------------------------------------------------
# Agents:
#   foundation:zen-architect — used for all LLM steps (must be resolvable)
#     Stage 1 write-content: needs read_file + write_file tools
#     Stage 2 generate-images: additionally needs openai_images / gpt_image tool
#     Stage 3 make-transitions: additionally needs bash (Playwright) + veo tool
#
# Python package (for bash steps):
#   director_deck — install with `pip install -e .` from project root
#
# Lint tool (optional, step continues on error if absent):
#   npx @google/design.md lint
#
# Usage:
#   amplifier run "execute recipes/director-deck.yaml with prompt='My topic here'"
#
# ---------------------------------------------------------------------------
# Context — provided at recipe invocation
# ---------------------------------------------------------------------------
context:
  prompt: ""           # Required: deck topic; must be provided at invocation
  run_slug: ""         # Optional: slug override (derived from prompt if empty)
  run_dir: ""          # Computed by init-run-dir step (output: run_dir → stdout)
  _approval_message: ""  # Set automatically by approval gates; default empty

# ---------------------------------------------------------------------------
# Stages — 4 work stages interleaved with 3 approval gates
# ---------------------------------------------------------------------------
stages:

  # ── Stage 1: Content & Identity ────────────────────────────────────────────
  - name: content-and-identity
    steps:

      - id: init-run-dir
        type: bash
        # Amplifier bash steps: stdout is captured and stored in `output`.
        # Print ONLY the path to stdout; diagnostics go to stderr.
        command: |
          DATE=$(date +%Y-%m-%d)
          SLUG="{{run_slug}}"
          if [ -z "$SLUG" ]; then
            SLUG=$(echo "{{prompt}}" | tr '[:upper:]' '[:lower:]' \
                   | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40 | sed 's/-$//')
          fi
          RUN_DIR="runs/${DATE}-${SLUG}"
          mkdir -p "${RUN_DIR}/assets" "${RUN_DIR}/keyframes" "${RUN_DIR}/transitions"
          echo "Run directory: ${RUN_DIR}" >&2
          printf "%s" "${RUN_DIR}"
        output: run_dir   # stdout → {{run_dir}} available in all subsequent steps

      - id: write-content
        # Replaces local agent: ghost-deck-writer
        # Inlines the full ghost-deck-writer system prompt and instructions.
        # Tools needed: read_file, write_file (standard foundation tools).
        type: agent
        agent: self
        timeout: 600
        prompt: |
          You are the Ghost Deck Writer for Director Deck. From a user prompt you
          produce two files that drive the entire pipeline. Use your file-writing
          tools to create them — do NOT just output the content as text.

          ## Context variables

          run_dir               = {{run_dir}}
          prompt                = {{prompt}}
          revision_instructions = {{_approval_message}}
          (revision_instructions is empty on the first run)

          ---

          ## STEP 1 — GHOST DECK (do this before writing any content)

          Write all slide titles first as an internal outline. Read just the titles.
          This is the **Newspaper Test** — if someone reading only the titles gets
          the full argument, you have a coherent deck. If not, restructure before
          writing a single bullet.

          If any title could be a table-of-contents entry, it's a label — rewrite
          it as a claim. Every title must state a claim the slide body then proves.

          **Assertion title transformation — never use labels:**

          | Label Title (never use) | Assertion Title (always use) |
          |---|---|
          | Market Overview | The mid-market segment is underserved and growing 23% YoY |
          | Implementation Timeline | We can ship Phase 1 in 6 weeks with the existing team |
          | Risk Assessment | Three risks could delay launch; all have mitigations |
          | Methodology | Zero Trust works because it eliminates implicit trust at every layer |
          | Team Structure | Cross-functional pods ship 40% faster than siloed teams |
          | Q3 Results | Q3 exceeded targets on 4 of 5 OKRs despite the August outage |
          | Competitive Landscape | Three competitors are converging on our core market |
          | Next Steps | Two decisions this week determine whether we ship in Q2 or Q3 |

          ---

          ## STEP 2 — CHOOSE STORYTELLING FRAMEWORK

          Pick one framework before writing any content. Apply it consistently:

          - **Answer-first** — State the conclusion upfront, then prove it. Every
            slide stands alone. Use when: executives who may interrupt; conclusion
            is not controversial; fast read needed.
          - **Tension-resolution** — Show problem, make it feel urgent, reveal
            solution, prove it works. Use when: audience needs to feel something
            is broken before they care about a fix; sales; change management.
          - **Progressive-discovery** — Ask a question, walk through findings one
            at a time, build to implications. Use when: audience needs to understand
            the reasoning, not just the answer; teaching; technical deep-dives.
          - **Problem-solution-impact** — Frame the problem, show the approach,
            prove the result. Use when: presenting completed work, projects, demos.
            Default for most cultural/editorial/food topics.
          - **Status-report** — Objectives, progress with metrics, blockers, plan.
            Use when: routine update where audience already understands the project.
          - **Retrospective** — What happened, what worked, what didn't, what
            changes. Use when: the purpose is learning, not persuasion.

          ---

          ## STEP 3 — OUTCOMES OVER ACTIVITY

          Hard rule: never lead with activity metrics. Audiences care what changed,
          not how busy the work was.

          | Activity (never lead with) | Outcome (always lead with) |
          |---|---|
          | 312 commits this sprint | Shipped the new onboarding flow — activation up 18% |
          | Wrote 3,200 lines of code | Replaced the legacy parser; import time 8s → 0.4s |
          | 94% test coverage | Zero regressions in 6 weeks of production traffic |

          ---

          ## STEP 4 — THE SO WHAT TEST

          For every slide: who cares, and why? The title must answer "so what?"
          without the audience having to do the work.

          ✗  "Latency dropped from 340ms to 12ms"
          ✓  "Latency dropped from 340ms to 12ms — users see results before they finish typing"

          Per format:
          - Stat callouts: the number is not enough; add the consequence
          - Comparisons: label the winner and say why it matters
          - Bullets: each bullet is a claim, not a category

          If you cannot articulate the so-what for a slide, the slide should not
          exist.

          ---

          ## STEP 5 — EMOTIONAL ARC

          Design 2–3 peak moment slides first, then build the rest around them:

          - **The gap slide** — the problem felt viscerally; audience feels cost of
            inaction
          - **The reveal slide** — the solution clicks; the "aha" moment
          - **The proof slide** — skeptics nod; evidence that overcomes the default
            objection
          - **The close slide** — thesis restated as a specific call to action.
            Not "Thank You." Not "Questions?" A specific ask.

          Ask yourself: "Which 2 slides will the audience remember tomorrow?"
          If you can't answer that, restructure.

          ---

          ## STEP 5b — TRANSITION PACING

          **This is an editorial decision, not a technical one.** You are setting
          `transition_duration_s` on each slide — how long the Veo transition clip
          plays BEFORE this slide appears. Think like a film editor.

          ASK FOR EACH TRANSITION:
          1. What just happened emotionally on the slide the audience is leaving?
          2. How heavy is that moment — does it need time to land?
          3. What is the next slide delivering — a surprise, a pivot, a resolution?
          4. What is the deck's overall emotional register?

          PACING BY DECK TYPE:

          Contemplative / cultural (food, ritual, memory, craft, travel):
            Default: 4.5–6.0s. Never rush a feeling.
            A deck about slowing down must itself not rush.
            "The joy of Hong Kong milk tea" → 4.0–6.0s on most transitions.

          Business / pitch (decisions, data, urgency):
            Default: 2.0–3.5s. Respect momentum and the audience's time.

          CONTENT WEIGHT MODIFIERS:

          +1.5–2.0s when the slide just shown is emotionally heavy:
            — A stat revealing loss, decline, or scale of a problem
            — A full-bleed image that creates visceral feeling
            — The pivot point of the whole deck (problem→solution turn)

          +1.5–2.0s when approaching a meditative moment:
            — transition INTO a statement slide (breather needs a slow approach)
            — transition INTO the closing hero (ceremony deserves time)

          −0.5–1.0s for quick logical transitions:
            — bullets → bullets (continuing an argument)
            — process step → next process step (sequence)

          EXAMPLE REASONING (HK milk tea deck):
            stat_callout "30 cha chaan tengs lost" → statement "The joy isn't in
            the caffeine": 6.0s. Grief needs to land before wisdom can be heard.

            statement → closing hero: 5.5s. Ceremonial. The ending is the point.

            hero → timeline: 5.0s. The opening devotion lingers before history.

            comparison → stat_callout: 4.5s. Approaching the gut punch. Heavy.

            bullets → comparison: 3.5s. Logical step, not emotional.

          SET transition_duration_s EXPLICITLY ON EVERY SLIDE.
          Do not leave it null. You are the editor. Make the call.

          ---

          ## STEP 6 — WRITE THE JSON

          Write {{run_dir}}/slide_deck.json matching this schema exactly:

          {
            "meta": {
              "title": "<concise deck title>",
              "prompt": "<original prompt verbatim>",
              "slide_count": <N>
            },
            "slides": [
              {
                "id": 1,
                "title": "<assertion title — the claim this slide proves>",
                "layout_type": "<one of 9 layout types — see below>",
                "hero_statement": "<for hero/statement/stat_callout/full_bleed: the one thing>",
                "bullets": ["<bullet 1>", "<bullet 2>"],
                "speaker_notes": "Key point: [2-3 sentences of depth the presenter carries verbally]. If challenged: [specific rebuttal to the most likely objection]. Transition: [one sentence connecting to the next slide's assertion].",
                "image_brief": "<vivid, specific, 1-sentence image description>",
                "backdrop_brief": "<texture/gradient/mood — no text, no faces, no logos>",
                "assets": { "image": null, "backdrop": null },
                "transition_to_next": null
              }
            ]
          }

          ---

          ## LAYOUT TYPES — pick by decision tree

          Ask these questions in order to pick layout_type:

          1. Opening or closing slide? → **hero**
             hero_statement = the most powerful sentence in the deck
             bullets = [] or one short sub-line
          2. Chapter/section break, breather between dense slides? → **statement**
             hero_statement = the chapter title
             bullets = []
          3. One striking number or metric that IS the point? → **stat_callout**
             hero_statement = the number ("94%", "1952", "£2.1B")
             bullets[0] = the consequence ("of Hong Kong residents drink it daily")
          4. Powerful quote from a named source? → **quote**
             hero_statement = the quote text
             bullets[0] = attribution
          5. Two opposing things side-by-side? → **comparison**
             title = "X vs Y" or "Before / After" (the "/" splits column headers)
             bullets = split evenly between columns
          6. Image makes the argument better than words? → **full_bleed**
             hero_statement = optional 1 sentence overlay
             bullets = []
          7. 3–5 sequential steps? → **process_flow**
             bullets = numbered steps ("1. Step one", "2. Step two")
          8. Chronological with years/dates? → **timeline**
             bullets = dated events ("1952: First cha chaan teng opens in Kowloon")
          9. Otherwise → **bullets**
             title + 2–4 bullets + content image

          **Pacing rules:**
          - Every slide is LIGHT, MEDIUM, or HEAVY (>3 content blocks = heavy)
          - No two consecutive HEAVY slides
          - At least one LIGHT slide per three (hero/statement/stat_callout = light)
          - hero/statement slides ARE peak moments, not pauses
          - Under 50 words total per slide (title + bullets)
          - No more than 3 consecutive "bullets" slides

          **Slide count:**
          - 8–12 slides (default); audience calibration:
            - Executives: 6–10 (lead with conclusion, frame around decisions)
            - Teams: 10–15 (include methodology and detail)
            - External/cultural: 8–12 (their world first, proof second)

          ---

          ## File 2 — {{run_dir}}/DESIGN.md

          YAML frontmatter + 3 markdown sections.

          ---
          name: <deck title>
          colors:
            primary: "<hex>"          # dominant slide background
            accent: "<hex>"           # headlines, callouts, peak elements
            surface: "<hex>"          # card/panel backgrounds
            on-surface: "<hex>"       # body text (hyphen, not underscore)
          typography:
            h1:
              fontFamily: <name>
              fontSize: <e.g. 52px>
              fontWeight: <e.g. 700>
            body-md:
              fontFamily: <name>
              fontSize: <e.g. 18px>
              fontWeight: <e.g. 400>
          spacing:
            slide-padding: <e.g. 64px>
            section-gap: <e.g. 32px>
          ---

          ## Overview
          2–3 vivid, sensory sentences. Describe the emotional register and the
          specific visual world of this deck. This text is injected verbatim into
          Veo transition prompts and image generation — make it specific enough to
          constrain an image model. NOT: "professional and clean." YES: "warm amber
          light through a condensation-fogged window in a Hong Kong cha chaan teng
          at seven in the morning — formica, steam, worn ceramic."

          ## Colors
          Bullet list: each color, its role, and the feeling it creates.

          ## Do's and Don'ts
          5–7 concrete rules. Include: what motion/texture to use, what imagery
          specifically belongs, what to never include. These feed directly into
          image and video generation prompts so be specific.

          ## Legibility & Accessibility (REQUIRED — always include)
              Specify every text/background pairing with estimated contrast ratio.
              Standards: 4.5:1 for body text, 3:1 for large headings (≥24px bold).
              For each surface, state which text color sits on it and passes/fails.
              Specify required dark scrim opacity for any text-over-imagery cases.
              This section is read verbatim by the slide frame generator — be precise.
              Example format:
                "on-surface (#E2E8F0) on primary (#0A0E1A) ≈ 13:1 ✓ highly legible.
                accent (#F59E0B) on primary ≈ 6.8:1 ✓ acceptable for large headings.
                NEVER place body text on accent or bright imagery without a dark
                gradient scrim at ≥65% opacity behind the text block."

                        Infer from topic/tone:
          - Executive / formal → dark background, muted palette, neutral sans-serif
          - Consumer / startup → high contrast, energetic accent, modern sans-serif
          - Healthcare / legal → clean light background, trustworthy blues or greens
          - Cultural / food / craft → expressive palette, warm accent, serif display

          ---

          ## Handling revision_instructions (when non-empty)

          Apply them before writing. Common patterns:
          - "make slide 3 punchier" → sharpen the assertion title, tighten bullets,
            consider switching to hero or stat_callout layout
          - "change accent to teal" → update DESIGN.md frontmatter and prose
          - "add a slide about X" → insert at appropriate position, update slide_count
          - "the deck feels generic" → reapply So What Test to every title

          ---

          ## After writing both files

          Output confirmation:
          ✓ slide_deck.json — {N} slides | framework: {chosen} | arc: {gap/reveal/proof/close identified}
            Layout mix: {breakdown e.g. "hero ×2, statement ×1, stat_callout ×1, bullets ×5, full_bleed ×1"}
          ✓ DESIGN.md — "{name}", primary {primary}, accent {accent}

      - id: build-wireframe
        # Replaces local agent: slide-architect (mode: wireframe)
        # Runs the director_deck Python utilities directly — no LLM needed.
        type: bash
        timeout: 300
        command: |
          .venv/bin/python -c "
          from pathlib import Path
          from director_deck.schema import SlideDeck, DesignTokens
          from director_deck.html_renderer import write_deck_html
          from director_deck.pptx_builder import build_pptx

          run = Path('{{run_dir}}')
          deck = SlideDeck.from_file(run / 'slide_deck.json')
          tokens = DesignTokens.from_design_md(run / 'DESIGN.md')
          write_deck_html(deck, tokens, run / 'deck_wireframe.html', enriched=False)
          build_pptx(deck, tokens, run / 'deck_wireframe.pptx', enriched=False)
          print('done')
          "

    approval:
      required: true
      prompt: |
        Review the wireframe deck before image generation begins.

          Open in browser:    {{run_dir}}/deck_wireframe.html
          Open in PowerPoint: {{run_dir}}/deck_wireframe.pptx

        You may edit before approving:
          {{run_dir}}/slide_deck.json  — titles, bullets, image briefs
          {{run_dir}}/DESIGN.md        — colors, fonts, design rationale

        Approval message may include revision instructions, e.g.:
          "make slide 3 punchier, change accent to teal"
        These are passed to write-content on the next run.

        Approve when: content flow is correct, visual identity feels right,
        placeholder layout looks good at 960×540.
      timeout: 0
      default: "deny"

  # ── Stage 2: Visual Generation ─────────────────────────────────────────────
  - name: visual-generation
    steps:

      - id: generate-slide-frames
        # NEW v0.4.0: Replaces generate-images + build-enriched.
        # Instead of generating backdrop/content images separately and compositing
        # in HTML, GPT Image renders each slide as a single complete image —
        # background atmosphere, text, layout, and visual elements in one shot.
        # GPT Image's text-rendering intelligence produces more coherent slides
        # than CSS compositing. Output goes directly to pixel_slides/ (used by
        # transitions step and final assembly — no HTML enrichment step needed).
        type: agent
        agent: self
        timeout: 3600
        prompt: |
              You are the Slide Frame Director for Director Deck. Generate each
              presentation slide as a SINGLE, COMPLETE image using the gpt_image tool.
              Do NOT generate separate backdrop and content images and try to composite
              them. Generate the entire slide — atmosphere, typography, layout, visual
              elements — as one unified image that GPT Image composes holistically.

              ## ⚠️ SIZE: 1536×864 (16:9) — NON-NEGOTIABLE
              Every slide image MUST be 1536×864 pixels.
              Use size "1536x864" in every gpt_image call.
              This exact size is required for seamless Veo transition interpolation.

              ## Context variables

              run_dir        = {{run_dir}}
              slides_to_redo = {{_approval_message}}
              (empty on first run — generate ALL slides)

              ## Step 1 — Read inputs

              Read these files:
              1. {{run_dir}}/slide_deck.json — all slide content
              2. {{run_dir}}/DESIGN.md — extract ALL sections:
                 - YAML frontmatter (primary, accent, surface, on-surface hex values)
                 - ## Overview prose (inject verbatim into every prompt)
                 - ## Colors (role of each color)
                 - ## Do's and Don'ts (strict generation rules)
                 - ## Legibility & Accessibility (contrast rules, scrim requirements)

              ## Step 2 — Determine which slides to process

              If slides_to_redo is non-empty (e.g. "3,5"), process only those IDs.
              If empty, process all slides.

              ## Step 3 — Build prompt per slide

              For each slide N, construct this prompt (fill in all placeholders):

              ---
              Render a complete professional presentation slide as a single image.
              This is slide {N} of {total} in a business presentation deck.

              SLIDE LAYOUT: {layout_type}
              hero        = large centered statement over full-bleed atmospheric background
              stat_callout= enormous number/stat centered, supporting label below it
              statement   = large centered text only, section divider, no imagery
              full_bleed  = full-screen imagery with minimal text overlay at bottom
              bullets     = title at top + bullet list filling the slide
              comparison  = two equal columns side-by-side with column headers
              timeline    = title + horizontal/diagonal progression of dated events
              process_flow= title + numbered sequential steps
              quote       = large italic blockquote centered with attribution below

              TEXT TO RENDER (reproduce this text EXACTLY, clearly legible):
              {layout-specific content — map below}

              VISUAL ATMOSPHERE:
              {slide.image_brief}
              Background mood: {slide.backdrop_brief}

              DESIGN IDENTITY — apply this aesthetic faithfully:
              {DESIGN.md ## Overview verbatim}

              COLOR PALETTE:
              Background: {primary hex} — {description from ## Colors}
              Accent/headlines: {accent hex} — {description from ## Colors}
              Body text: {on_surface hex} — {description from ## Colors}

              DESIGN RULES (follow strictly — from DESIGN.md ## Do's and Don'ts):
              {DESIGN.md ## Do's and Don'ts verbatim}

              SAFE ZONE (from DESIGN.md ## Safe Zone & Composition — mandatory):
              {DESIGN.md ## Safe Zone & Composition verbatim}

              LEGIBILITY & ACCESSIBILITY (non-negotiable):
              {DESIGN.md ## Legibility & Accessibility verbatim}
              ADDITIONAL RULES:
              - Every text element must be clearly readable at presentation distance
              - Title/headline: large, bold, high contrast against its background
              - Body text: meets minimum 4.5:1 contrast against immediate background
              - If text overlaps imagery: render a dark gradient scrim behind the text
              - No text may be partially obscured, blurred, or illegible

              ⚠️ SAFE ZONE — NON-NEGOTIABLE — READ BEFORE PLACING ANY TEXT:
              The slide will be center-cropped and displayed at various sizes.
              Text outside the safe zone WILL be cut off and invisible to the audience.
              ALL text (titles, headlines, stats, bullets, footnotes, labels) MUST
              fall ENTIRELY within this rectangle on a 1536×864 canvas:
                X: 120px → 1416px  (leave 120px clear on left AND right)
                Y: 130px → 734px   (leave 130px clear on TOP AND BOTTOM)
              Footnotes and citations: place between y=700 and y=734 only. Never lower.
              Background imagery may bleed to full edges. Only TEXT has this constraint.
              When in doubt, move text MORE toward the center. Closer is safer.

              TECHNICAL:
              - 1536×864 pixels, 16:9 widescreen presentation format
              - No watermarks, borders, slide numbers, or UI artifacts
              - Professional finish, zero placeholder elements
              ---

              TEXT CONTENT MAPPING BY LAYOUT TYPE:
              - hero: "HERO STATEMENT (large, centered, accent color): {hero_statement}"
                      + if bullets[0]: "SUB-LINE (smaller, below statement): {bullets[0]}"
              - statement: "LARGE CENTERED TEXT (accent or on-surface color): {hero_statement or title}"
              - stat_callout: "LARGE STAT (enormous, centered, accent color): {hero_statement}"
                              "SUPPORTING LABEL (body size, centered below): {bullets[0]}"
              - quote: "QUOTE (large italic, centered): {hero_statement}"
                       "ATTRIBUTION (small caps, below): — {bullets[0]}"
              - full_bleed: "TEXT OVERLAY (bottom, over dark gradient): {hero_statement or title}"
              - bullets: "SLIDE TITLE (top, accent color): {title}"
                         "BULLET LIST (body text, arrow prefix →):"
                         {each bullet on its own line}
              - comparison: "SLIDE TITLE: {title}"
                            Split title at ' / ' for column headers
                            "LEFT COLUMN HEADER: {left_header}"
                            LEFT BULLETS: {bullets[:mid]}
                            "RIGHT COLUMN HEADER: {right_header}"
                            RIGHT BULLETS: {bullets[mid:]}
              - timeline: "SLIDE TITLE: {title}"
                          "TIMELINE ENTRIES (show as visual progression):"
                          {each bullet as a node}
              - process_flow: "SLIDE TITLE: {title}"
                              "NUMBERED STEPS:"
                              {each bullet}

              ## Step 4 — Generate images

              Ensure {{run_dir}}/pixel_slides/ directory exists.

              For each slide N to process, call gpt_image:
                operation:   "generate"
                model:       "gpt-image-2"
                size:        "2560x1440"  ← 2K 16:9, in enum, no crop needed
              Do not skip any slide.

              ## After completing

              ✓ pixel_slides/slide-1.png
              ✓ pixel_slides/slide-2.png
              ...
              ✓ pixel_slides/slide-{N}.png
              All {N} slide frames generated as complete unified images.

    
    approval:
      required: true
      prompt: |
            Review the generated slide frames before transition generation begins.

              Open directory: {{run_dir}}/pixel_slides/
              Preview each slide-N.png as a complete, final slide image.

            Request specific re-generations in the approval message, e.g.:
              "redo slides 3,5 — text too small on 3, wrong colors on 5"
            generate-slide-frames will regenerate only the named slides.

            Approve when: all slides are legible, text is clearly readable,
            visual identity is consistent, deck looks polished end-to-end.
      timeout: 0
      default: "deny"

  # ── Stage 3: Transitions ───────────────────────────────────────────────────
  - name: transitions
    steps:

      - id: prepare-keyframes
        # Prepares 1536×864 keyframes for Veo from pixel_slides/.
        # pixel_slides/ may be any size; this step scales/crops to exact 1536×864.
        # stat_callout slides get a center-band blur so Veo can't read the large
        # number and hallucinate context (e.g. "SLA achieved" for 99.03%).
        # Only the center vertical band is blurred — background stays sharp.
        type: bash
        timeout: 120
        command: |
          .venv/bin/python -c "
          import json
          from pathlib import Path
          from PIL import Image, ImageFilter

          run    = Path('{{run_dir}}')
          kf_dir = run / 'keyframes'
          kf_dir.mkdir(exist_ok=True)
          slides = json.loads((run / 'slide_deck.json').read_text())['slides']
          total  = len(slides)

          tw, th = 1536, 864
          disp_dir = run / 'display_slides'
          disp_dir.mkdir(exist_ok=True)

          for i, slide in enumerate(slides):
              s_id = slide['id']
              src = run / 'pixel_slides' / f'slide-{s_id}.png'
              if not src.exists():
                  print(f'  WARNING: {src.name} missing')
                  continue
              img = Image.open(src).convert('RGB')
              sw, sh = img.size
              # Center-crop to 16:9
              if sw/sh > tw/th:
                  new_w = int(sh * tw / th)
                  img = img.crop(((sw-new_w)//2, 0, (sw+new_w)//2, sh))
              else:
                  new_h = int(sw * th / tw)
                  img = img.crop((0, (sh-new_h)//2, sw, (sh+new_h)//2))
              img = img.resize((tw, th), Image.LANCZOS)
              # Both display_slides and keyframes are identical — clean, no blur.
              # Veo receives the real unmodified keyframe and is instructed
              # via prompt not to invent new statistics or visual elements.
              img.save(disp_dir / src.name, 'PNG')
              img.save(kf_dir / src.name, 'PNG')
              print(f'  {src.name}: {sw}x{sh} → {tw}x{th}')
          print('done')
          "

      - id: make-transitions
        # Replaces local agent: transition-director
        # Inlines the full transition-director system prompt and instructions.
        # Requires: bash tool (for Playwright screenshots) + veo tool
        # (for video generation). If those are not in the foundation agent's
        # sub-session, extend via agent_config accordingly.
        type: agent
        agent: self
        timeout: 7200
        prompt: |
          You are the Transition Director for Director Deck. Produce short video
          clips that play between slides as cinematic transitions. Use your tools
          to actually run the commands and generate the videos — do not just
          describe what you would do.

          ## ⚠️ SEAMLESS TRANSITION RULE — READ FIRST

          All keyframe images AND Veo transition clips MUST be 16:9.
          Veo outputs 16:9 video. If keyframe inputs are a different aspect
          ratio (e.g. 3:2 = 1536×1024), the transition clip's first/last frames
          won't match the slides, causing a visible dimension jump (150px+ on
          each side on a 1920×1080 display).

          Keyframes MUST be 1536×864 (16:9). Veo aspect_ratio MUST be "16:9".
          duration_seconds MUST be "8" (required minimum for interpolation).

          ## Context variables

          run_dir       = {{run_dir}}
          pairs_to_redo = {{_approval_message}}
          (pairs_to_redo is empty on the first run — generate ALL pairs)

          ## Step 1 — Capture keyframes

          PREFER pixel slides if they exist — they are already the correct 16:9
          dimensions (1536×864) and don't need Playwright:

          python -c "
          from pathlib import Path
          from director_deck.schema import SlideDeck

          run = Path('{{run_dir}}')
          deck = SlideDeck.from_file(run / 'slide_deck.json')
          px_dir = run / 'pixel_slides'
          kf_dir = run / 'keyframes'
          kf_dir.mkdir(parents=True, exist_ok=True)

          # Prefer pixel_slides/ (already 16:9), fall back to Playwright
          import shutil
          for slide in deck.slides:
              src = px_dir / f'slide-{slide.id}.png'
              dst = kf_dir / f'slide-{slide.id}.png'
              if src.exists():
                  shutil.copy2(src, dst)
                  print(f'Copied pixel slide {slide.id}: {dst}')
              else:
                  print(f'WARNING: pixel slide {slide.id} missing — will use Playwright')
          "

          If any pixel slides are missing, fall back to Playwright at EXACTLY
          1536×864 (not the old 960×540):

          python -c "
          from pathlib import Path
          from director_deck.schema import SlideDeck
          from director_deck.screenshot_tool import screenshot_deck

          run = Path('{{run_dir}}')
          deck = SlideDeck.from_file(run / 'slide_deck.json')
          # width=1536, height=864 → EXACT 16:9 to match Veo output
          paths = screenshot_deck(
              run / 'deck_enriched.html',
              run / 'keyframes',
              slide_count=deck.meta.slide_count,
              width=1536,
              height=864,
          )
          for p in paths:
              print(p)
          "

          If pairs_to_redo is non-empty and keyframes already exist, you may skip
          re-capturing and reuse the existing images.

          ## Step 2 — Extract DESIGN.md Overview prose

          Read {{run_dir}}/DESIGN.md. Extract the ## Overview section — the text
          between the ## Overview heading and the next ## heading. Use the first
          1–2 sentences as style context for Veo prompts.

          ## Step 3 — Determine which slide pairs to process

          A deck with N slides has N-1 transition pairs: (1→2), (2→3), …, ((N-1)→N).

          If pairs_to_redo is non-empty (e.g. "1-2,3-4"), parse into a list of
          (from, to) integer tuples and process only those pairs. Leave existing
          MP4 files and transition_to_next values for other pairs unchanged.

          If pairs_to_redo is empty, process all pairs.

          ## Step 4 — Generate transition clips

          PROMPT RULE — the #1 cause of invented text is using the word
          "presentation" or "slide" in the prompt. Veo associates those words
          with "generate slide content including text and charts" and does so
          in intermediate frames. The fix: describe it as a CINEMATIC SCENE,
          never as a slide or presentation.

          PROMPT FORMULA — use EXACTLY this, fill in [SPEED], [CAMERA], [FOCUS]:

            "[SPEED] cinematic animation. [CAMERA]. Focus on [FOCUS] — hold
            the viewer's eye on it as it morphs and carries through into the
            next scene. Do not invent, alter, or add any new statistics,
            numbers, charts, or text that do not appear in the first or last
            frame. Animate only what is already present in both frames."

          [SPEED]:
            "Slow" — hero, statement, full_bleed, quote
            "Medium" — stat_callout, bullets, timeline, comparison

          [CAMERA]:
            "Camera holds still" — hero, statement, stat_callout, quote
            "Slow camera drift" — full_bleed, bullets
            "Slight pull back" — comparison, timeline

          [FOCUS] — describe by position/shape only, never quote the text:
            stat_callout   → "the large bright shape at the center of the frame"
            hero/statement → "the bright horizontal band at the center of the frame"
            full_bleed     → "the dominant light source in the scene"
            bullets        → "the bright element at the top of the frame"
            timeline       → "the glowing node at the right end of the line"
            comparison     → "the bright vertical line at the center of the frame"
            quote          → "the central text block"

          NEVER use the words: "presentation", "slide", "deck", "infographic",
          "PowerPoint", "chart", "data visualization". These trigger Veo to
          generate slide-like content in intermediate frames.

          Then call the veo tool with:
            operation:        image_to_video
            model:            veo-3.1-generate-preview
            image_path:       {{run_dir}}/keyframes/slide-{N}.png
            last_frame_path:  {{run_dir}}/keyframes/slide-{N+1}.png
            prompt:           <constructed from formula above>
            duration_seconds: "8"
            aspect_ratio:     "16:9"
            output_path:      {{run_dir}}/transitions_raw/slide-{N}-to-{N+1}.mp4

          Generate clips SEQUENTIALLY — do not attempt parallel Veo calls.

          ⚠️ SEAMLESS RULE: keyframes and Veo output are both 16:9. The
          HTML and PPTX must display both at the same pixel dimensions. If the
          canvas shows the slide at 1536×864, the transition video fills that
          same 1536×864 canvas — no letterbox, no dimension jump.

          Create {{run_dir}}/transitions_raw/ before saving if it does not exist.
          Generate clips SEQUENTIALLY — do not attempt parallel Veo calls.

          ## Step 5 — Update slide_deck.json

          After generating all clips, record the raw paths:
            "transition_to_next": "transitions_raw/slide-{N}-to-{N+1}.mp4"

          The final slide always has "transition_to_next": null.
          Write the updated slide_deck.json back to {{run_dir}}/slide_deck.json.
          The process-transitions step (next) will update these paths to
          the final processed files in transitions/.

          ## After completing

          Output:
          ✓ keyframes: slide-1.png … slide-{N}.png
          ✓ transitions_raw: slide-1-to-2.mp4 … slide-{N-1}-to-{N}.mp4 (raw Veo)
          ✓ slide_deck.json updated with transitions_raw paths (temporary)

      - id: process-transitions
        # Post-process raw Veo clips: strip AI audio + retime with easing.
        # Reads transition_duration_s and transition_easing from slide_deck.json.
        # Input:  transitions_raw/slide-N-to-M.mp4  (raw 8s Veo output)
        # Output: transitions/slide-N-to-M.mp4      (final, no audio, retimed)
        # Updates slide_deck.json transition_to_next to point to transitions/ paths.
        type: bash
        timeout: 600
        command: |
          .venv/bin/python -c "
          from pathlib import Path
          from director_deck.schema import SlideDeck
          from director_deck.video_processor import process_transition, suggest_transition_duration

          run = Path('{{run_dir}}')
          deck = SlideDeck.from_file(run / 'slide_deck.json')
          slides = deck.slides
          out_dir = run / 'transitions'
          out_dir.mkdir(exist_ok=True)

          for i, slide in enumerate(slides[:-1]):
              next_slide = slides[i + 1]
              raw = run / 'transitions_raw' / f'slide-{slide.id}-to-{next_slide.id}.mp4'
              out = out_dir / f'slide-{slide.id}-to-{next_slide.id}.mp4'

              if not raw.exists():
                  print(f'  WARNING: {raw.name} not found, skipping')
                  continue

              target = slide.transition_duration_s or suggest_transition_duration(
                  slide.layout_type, next_slide.layout_type
              )
              easing = slide.transition_easing or 'ease_in_out'

              process_transition(raw, out, target_duration_s=target, easing=easing)
              print(f'  {out.name}: {target}s {easing} (raw {raw.stat().st_size//1024}KB -> {out.stat().st_size//1024}KB)')

          # Update slide_deck.json to final transitions/ paths
          import json
          data = json.loads((run / 'slide_deck.json').read_text())
          for i, s in enumerate(data['slides'][:-1]):
              next_id = data['slides'][i + 1]['id']
              s_id = s['id']; next_id = data['slides'][i + 1]['id']
              s['transition_to_next'] = f'transitions/slide-{s_id}-to-{next_id}.mp4'
          data['slides'][-1]['transition_to_next'] = None
          (run / 'slide_deck.json').write_text(json.dumps(data, indent=2, ensure_ascii=False))
          print('slide_deck.json updated — transition_to_next now points to processed transitions/')
          "

    approval:
      required: true
      prompt: |
        Preview the processed transition clips (audio stripped, retimed).

          Open directory: {{run_dir}}/transitions/          (processed, no audio)
          Raw Veo clips:  {{run_dir}}/transitions_raw/      (original 8s clips)

        You may request specific clip regenerations in the approval message, e.g.:
          "redo slide 2 to 3 — motion feels wrong. rest is good."
        make-transitions will regenerate only those pairs.

        Approve when: all transitions feel smooth and match the deck's aesthetic.
      timeout: 0
      default: "deny"

  # ── Stage 4: Final Assembly ────────────────────────────────────────────────
  - name: final-assembly
    steps:

      - id: assemble-deck
        # Builds final_deck.pptx using INTERSTITIAL VIDEO SLIDES (add_movie).
        #
        # ⚠️ IMPORTANT: Do NOT use pptx_stitcher.embed_transitions here.
        # embed_transitions injects <p:video> inside <p:transition> XML — that
        # element does not exist in OOXML and causes PowerPoint to break or
        # silently ignore the transitions.
        #
        # The correct approach: a 19-slide deck where content slides alternate
        # with full-screen video slides (one per transition). python-pptx's
        # add_movie() embeds the MP4 correctly as a playable media object.
        #
        # ⚠️ SEAMLESS RULE: Prefer pixel_slides/ as content images (already
        # 1536×864, pure 16:9). Fall back to deck_enriched.pptx assets only if
        # pixel slides don't exist. The PPTX slide size is 13.33×7.5 inches
        # (standard 16:9 widescreen). All images and videos must be 16:9.
        type: bash
        timeout: 300
        command: |
          .venv/bin/python -c "
          from pathlib import Path
          from pptx import Presentation
          from pptx.util import Inches
          from pptx.dml.color import RGBColor
          from director_deck.schema import SlideDeck

          run = Path('{{run_dir}}')
          deck = SlideDeck.from_file(run / 'slide_deck.json')
          slides = deck.slides

          W = Inches(13.33)   # 16:9 widescreen (13.33 x 7.5 inches)
          H = Inches(7.5)

          prs = Presentation()
          prs.slide_width  = W
          prs.slide_height = H
          BLANK = prs.slide_layouts[6]

          from PIL import Image as _PIL
          from pptx.dml.color import RGBColor

          def get_slide_img(slide):
              # display_slides/ = 16:9 center-crop, no blur — primary source for PPTX
              for d in ['display_slides', 'pixel_slides']:
                  p = run / d / f'slide-{slide.id}.png'
                  if p.exists(): return p
              if slide.assets.image:
                  p = run / slide.assets.image
                  if p.exists(): return p
              return None

          for i, slide in enumerate(slides):
              # ── Content slide ──────────────────────────────────────────────────────
              img = get_slide_img(slide)
              s = prs.slides.add_slide(BLANK)
              s.background.fill.solid()
              s.background.fill.fore_color.rgb = RGBColor(0, 0, 0)
              if img:
                  with _PIL.open(img) as _im: _iw, _ih = _im.size
                  _r = _iw / _ih; _sw, _sh = 13.33, 7.5
                  if _r > _sw / _sh:
                      _pw = _sw; _ph = _pw / _r; _l = 0;    _t = (_sh - _ph) / 2
                  else:
                      _ph = _sh; _pw = _ph * _r; _t = 0;    _l = (_sw - _pw) / 2
                  s.shapes.add_picture(str(img), Inches(_l), Inches(_t),
                                       Inches(_pw), Inches(_ph))
              print(f'  Content slide {slide.id}')

              # ── Interstitial transition slide (between consecutive slides)
              if i < len(slides) - 1:
                  mp4 = run / 'transitions' / f'slide-{slide.id}-to-{slides[i+1].id}.mp4'
                  if mp4.exists():
                      ts = prs.slides.add_slide(BLANK)
                      ts.background.fill.solid()
                      ts.background.fill.fore_color.rgb = RGBColor(0, 0, 0)
                      ts.shapes.add_movie(str(mp4), 0, 0, W, H, mime_type='video/mp4')
                      print(f'  Transition {slide.id}→{slides[i+1].id}  ({mp4.stat().st_size//1024}KB)')
                  else:
                      print(f'  WARNING: transition {slide.id}→{slides[i+1].id} not found — skipping')

          out = run / 'final_deck.pptx'
          prs.save(str(out))
          total = len(prs.slides)
          content_n = len(slides)
          trans_n = total - content_n
          print(f'Written: {out}  ({out.stat().st_size // (1024*1024):.1f}MB)')
          print(f'Slides: {total} total ({content_n} content + {trans_n} transition videos)')

          # Fix PPTX video slides — four python-pptx bugs patched:
          #   1. hlinkClick r:id="" — set to media rId so click-to-play works
          #   2. delay='indefinite' — changed to '0' so video autoplays on entry
          #   3. poster frame = shared speaker icon — replaced per-slide with the
          #      correct source slide image (no icon flash, seamless appearance)
          #   4. auto-advance not set — adds <p:transition advTm="{ms}"/> BEFORE
          #      <p:timing> (correct OOXML order), sets root cTn dur+fill="hold"
          #      and media cTn dur so slide advances cleanly when video ends
          from director_deck.pptx_fixer import fix_video_slides
          from director_deck.schema import SlideDeck as _SlideDeck
          _deck2 = _SlideDeck.from_file(run / 'slide_deck.json')
          _durations = [
              s.transition_duration_s
              for s in _deck2.slides[:-1]
              if (run / f'transitions/slide-{s.id}-to-{_deck2.slides[_deck2.slides.index(s)+1].id}.mp4').exists()
          ]
          fixed = fix_video_slides(
              out,
              keyframe_dir      = run / 'display_slides',
              slide_durations_s = _durations,
          )
          print(f'PPTX fixed: {fixed} video slides (poster frames replaced, auto-advance set)')

          # Always emit HTML player alongside PPTX
          from director_deck.html_renderer import write_live_html
          from director_deck.schema import DesignTokens
          _tokens = DesignTokens.from_design_md(run / 'DESIGN.md')
          write_live_html(deck, run, run / 'deck_live.html', tokens=_tokens)
          print(f'HTML player written: {run}/deck_live.html')
          "

      - id: report
        type: bash
        command: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Director Deck — Complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          ls -lh "{{run_dir}}/final_deck.pptx"
          echo "  Run directory: {{run_dir}}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
