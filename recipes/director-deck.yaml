# =============================================================================
# CHANGELOG
# =============================================================================
#
# v0.5.0 (2026-04-30):
#   FLEXIBLE INPUT — three input modes; recipe adapts pipeline accordingly.
#
#   New context variables:
#     pptx_input — path to a source .pptx; content extracted & re-rendered by GPT Image
#     html_input — path/URL to an HTML presentation; slides screenshot AS-IS,
#                  bypassing GPT Image generation entirely (html_input wins over pptx_input)
#
#   New step: analyze-input-deck
#     Uses python-pptx to extract slide content, theme colors, fonts, speaker notes,
#     and layout metadata into pptx_extract.json. No-op when pptx_input is empty.
#
#   New step: analyze-html-deck
#     Opens the HTML in Playwright, auto-detects format (Director Deck #slide-N
#     elements, keyboard-navigable Reveal.js/Impress.js, or viewport fallback),
#     captures 1536×864 screenshots of every slide into pixel_slides/.
#     No-op when html_input is empty.
#
#   Updated: init-run-dir
#     Derives slug from html_input filename (priority), then pptx_input, then prompt.
#
#   Updated: write-content — THREE operating modes (priority order):
#     1. HTML INPUT MODE:  Vision-analyzes pixel_slides/ screenshots → slide_deck.json
#        + DESIGN.md. Layout type is free-form. transition_prompt pre-written from
#        narrative analysis. Slide count from html_extract.json.
#     2. PPTX INPUT MODE: Reads pptx_extract.json → slide_deck.json + DESIGN.md.
#        Verbatim content. Free-form layout_type. transition_prompt pre-written.
#        Slide count locked to source deck.
#     3. TEXT PROMPT MODE: Ghost-deck-writer from scratch. 9 preset layout types.
#        Slide count from audience guidelines.
#
#   Updated: generate-slide-frames
#     Step 2: skip-if-exists — skips slides whose pixel_slides/slide-N.png already
#     exists (set by HTML capture). Respects slides_to_redo for forced re-generation.
#     Layout type handling: free-form types use image_brief; presets use layout table.
#
#   Updated: make-transitions
#     Uses slide.transition_prompt from slide_deck.json when set (written by write-content
#     in HTML/PPTX modes). Falls back to layout-pair formula for null prompts.
#
#   Schema changes (schema.py):
#     - LayoutType: Literal[9 types] → str (free-form, presets in PRESET_LAYOUT_TYPES)
#     - Slide.transition_prompt: new Optional[str] field for pre-written Veo prompts
#
# v0.2.0 (2026-04-22):
#   - BREAKING CHANGE: Replace unresolvable local-agent references with working
#     foundation:zen-architect steps + direct bash steps
#     * ROOT CAUSE: type:agent steps referencing bare agent names like
#       'ghost-deck-writer' fail at runtime with "Agent not found in
#       configuration" because local project agents/*.md files are NOT
#       auto-discovered by the Amplifier runtime. Only agents registered via
#       a bundle (bundle:agent-name) or placed in ~/.amplifier/agents/ are
#       resolvable by the recipe engine.
#     * FIX — two-pronged approach:
#       1. Deterministic agents (slide-architect, deck-stitcher) — these only
#          run known Python commands; converted to type:bash steps with the
#          exact commands from each agent's documentation inlined. Zero LLM
#          overhead; faster and more reliable.
#       2. LLM-driven agents (ghost-deck-writer, visual-director,
#          transition-director) — converted to type:agent with
#          foundation:zen-architect and the full agent system-prompt +
#          step-by-step instructions from each *.md file inlined in the
#          recipe step prompt. The foundation agent is always resolvable.
#     * NOTE on specialized tools: visual-director needs an image-generation
#       tool (openai_images / gpt_image) and transition-director needs bash
#       (Playwright) + veo. If foundation:zen-architect is not configured with
#       those tools in your session, extend via agent_config or ensure the
#       relevant tool modules are included in the foundation bundle.
#     * RESULT: Recipe no longer fails at agent discovery. All four stages
#       execute; the agent steps use the foundation agent with inlined
#       instructions that reproduce the original local-agent behavior.
#
# v0.3.0 (2026-04-23):
#   SEAMLESS TRANSITION RULES baked into all steps (fixes dimension mismatch
#   that caused a 150px jump when transitions played):
#   - generate-images: size 1536x1024 → 1536x864 (16:9 exact, both × 16)
#   - make-transitions: Playwright viewport 960×540 → 1536×864; prefer pixel
#     slides as keyframes; Veo duration_seconds "8" (required for interpolation)
#   - assemble-deck: replaced broken embed_transitions (<p:video> inside
#     <p:transition> is invalid OOXML) with add_movie() interstitial slides
#   - screenshot_tool.py: width/height now params (default 1536×864)
#   See: docs/SEAMLESS-TRANSITIONS-LESSONS.md
#
# v0.1.1 (2026-04-22):
#   - BUGFIX: init-run-dir bash step fails with "$RECIPE_ENV: ambiguous redirect"
#     * ROOT CAUSE: $RECIPE_ENV is not an Amplifier mechanism — the variable is
#       unset at runtime, so `>> $RECIPE_ENV` becomes an ambiguous redirect.
#     * FIX: Use the correct Amplifier bash-step output mechanism: print the
#       computed path to stdout and declare `output: run_dir` on the step.
#       Amplifier captures stdout and stores it in the named context variable,
#       making {{run_dir}} available to all subsequent steps.
#     * RESULT: run_dir propagates correctly through all four stages.

name: director-deck
version: "0.5.0"
description: >
  Turn a text prompt OR an existing PPTX into a polished AI-animated deck with
  GPT Image slides and Veo 3.1 video transitions. When a PPTX is supplied the
  source deck's layout, content, and narrative drive everything — slide count is
  preserved verbatim. Three human review gates ensure quality at content,
  visual, and transition checkpoints.

# ---------------------------------------------------------------------------
# Requirements
# ---------------------------------------------------------------------------
# Agents:
#   foundation:zen-architect — used for all LLM steps (must be resolvable)
#     Stage 1 write-content: needs read_file + write_file tools
#     Stage 2 generate-images: additionally needs openai_images / gpt_image tool
#     Stage 3 make-transitions: additionally needs bash (Playwright) + veo tool
#
# Python package (for bash steps):
#   director_deck — install with `pip install -e .` from project root
#
# Lint tool (optional, step continues on error if absent):
#   npx @google/design.md lint
#
# Usage:
#   amplifier run "execute recipes/director-deck.yaml with prompt='My topic here'"
#
# ---------------------------------------------------------------------------
# Context — provided at recipe invocation
# ---------------------------------------------------------------------------
context:
  prompt: ""           # Required if no pptx_input/html_input; deck topic for fresh generation
  pptx_input: ""       # Optional: path to source .pptx file; content extracted, then re-rendered
  html_input: ""       # Optional: path/URL to HTML presentation; slides screenshot as-is,
                       #   skipping GPT Image generation — html_input takes precedence over pptx_input
  run_slug: ""         # Optional: slug override (derived from prompt/PPTX/HTML filename)
  run_dir: ""          # Computed by init-run-dir step (output: run_dir → stdout)
  vlm_refine: ""       # Optional opt-in for Strategy 2 (html_input): after the overflow-based
                       #   ladder search picks a viewport, ask a VLM whether the slide looks
                       #   cramped/small; bump the viewport up one step if so. Caps at one
                       #   bump per slide (single VLM call per slide). Set to "true"/"1"/"yes"
                       #   to enable. Requires the openai package + OPENAI_API_KEY available
                       #   at recipe runtime. Off by default (silent skip).
  _approval_message: ""  # Set automatically by approval gates; default empty

# ---------------------------------------------------------------------------
# Stages — 4 work stages interleaved with 3 approval gates
# ---------------------------------------------------------------------------
stages:

  # ── Stage 1: Content & Identity ────────────────────────────────────────────
  - name: content-and-identity
    steps:

      - id: init-run-dir
        type: bash
        # Amplifier bash steps: stdout is captured and stored in `output`.
        # Print ONLY the path to stdout; diagnostics go to stderr.
        command: |
          DATE=$(date +%Y-%m-%d)
          SLUG="{{run_slug}}"
          if [ -z "$SLUG" ]; then
            HTML="{{html_input}}"
            PPTX="{{pptx_input}}"
            if [ -n "$HTML" ]; then
              # html_input takes precedence — derive slug from HTML filename
              SLUG=$(basename "$HTML" .html | tr '[:upper:]' '[:lower:]' \
                     | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40 | sed 's/-$//')
            elif [ -n "$PPTX" ]; then
              SLUG=$(basename "$PPTX" .pptx | tr '[:upper:]' '[:lower:]' \
                     | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40 | sed 's/-$//')
            else
              SLUG=$(echo "{{prompt}}" | tr '[:upper:]' '[:lower:]' \
                     | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40 | sed 's/-$//')
            fi
          fi
          RUN_DIR="runs/${DATE}-${SLUG}"
          mkdir -p "${RUN_DIR}/assets" "${RUN_DIR}/keyframes" "${RUN_DIR}/transitions"
          echo "Run directory: ${RUN_DIR}" >&2
          printf "%s" "${RUN_DIR}"
        output: run_dir   # stdout → {{run_dir}} available in all subsequent steps

      - id: analyze-input-deck
        # Extracts structured data from a source PPTX file when pptx_input is set.
        # No-op when pptx_input is empty (text-prompt mode).
        # Writes pptx_extract.json to run_dir for write-content to consume.
        # Requires: python-pptx (already a dependency via pptx_builder.py)
        type: bash
        timeout: 60
        command: |
          .venv/bin/python -c "
          import json, sys
          from pathlib import Path

          run_dir = Path('{{run_dir}}')
          pptx_input = '{{pptx_input}}'.strip()

          if not pptx_input:
              print('No PPTX input - running in text-prompt mode')
              sys.exit(0)

          from pptx import Presentation

          prs = Presentation(pptx_input)

          # Extract theme colors from the slide master via DrawingML XML
          theme_colors = {}
          try:
              ns = '{http://schemas.openxmlformats.org/drawingml/2006/main}'
              for master in prs.slide_masters:
                  clr = master.element.find(f'.//{ns}clrScheme')
                  if clr is not None:
                      for child in clr:
                          tag = child.tag.split('}')[-1]
                          srgb = child.find(f'{ns}srgbClr')
                          if srgb is not None:
                              theme_colors[tag] = '#' + srgb.get('val', '')
                      break
          except Exception as ex:
              theme_colors['error'] = str(ex)

          slides_data = []
          for i, slide in enumerate(prs.slides):
              s = {
                  'id': i + 1,
                  'layout_name': slide.slide_layout.name if slide.slide_layout else 'unknown',
                  'placeholders': [],
                  'extra_shapes': [],
                  'background_hex': None,
                  'notes': '',
              }
              # Structured placeholders: idx=0 = title, idx=1 = body/content
              for ph in slide.placeholders:
                  if ph.has_text_frame:
                      lines = [p.text for p in ph.text_frame.paragraphs if p.text.strip()]
                      s['placeholders'].append({
                          'idx': ph.placeholder_format.idx,
                          'type': str(ph.placeholder_format.type),
                          'name': ph.name,
                          'text': ph.text_frame.text.strip(),
                          'lines': lines,
                      })
              # Non-placeholder shapes with text (callouts, text boxes, etc.)
              for shape in slide.shapes:
                  if shape.is_placeholder:
                      continue
                  if shape.has_text_frame:
                      t = shape.text_frame.text.strip()
                      if t:
                          s['extra_shapes'].append({'name': shape.name, 'text': t})
              # Background solid fill color
              try:
                  bg_fill = slide.background.fill
                  if hasattr(bg_fill, 'fore_color'):
                      s['background_hex'] = '#' + str(bg_fill.fore_color.rgb)
              except:
                  pass
              # Speaker notes
              try:
                  if slide.has_notes_slide:
                      s['notes'] = slide.notes_slide.notes_text_frame.text.strip()
              except:
                  pass
              slides_data.append(s)

          # Fonts from slide master layouts
          fonts = []
          try:
              for master in prs.slide_masters:
                  for layout in master.slide_layouts:
                      for shape in layout.shapes:
                          if shape.has_text_frame:
                              for para in shape.text_frame.paragraphs:
                                  for run in para.runs:
                                      if run.font.name and run.font.name not in fonts:
                                          fonts.append(run.font.name)
          except:
              pass

          output = {
              'source': pptx_input,
              'slide_count': len(prs.slides),
              'theme_colors': theme_colors,
              'fonts': fonts,
              'slides': slides_data,
          }
          out = run_dir / 'pptx_extract.json'
          out.write_text(json.dumps(output, indent=2, ensure_ascii=False))
          print(f'Extracted {len(slides_data)} slides from {pptx_input}')
          print(f'Written to {out}')
          "

      - id: analyze-html-deck
        # Captures each slide from an HTML presentation as a PNG using Playwright.
        # html_input TAKES PRECEDENCE over pptx_input — when html_input is set, the
        # captured screenshots become pixel_slides/ directly, bypassing GPT Image
        # generation entirely. The write-content agent then analyzes the screenshots
        # with vision to write slide_deck.json + DESIGN.md.
        #
        # Supports three HTML deck formats (auto-detected):
        #   1. Director Deck HTML (deck_wireframe.html / deck_live.html):
        #      Finds #slide-N elements and screenshots each one at 1536×864.
        #   2. Reveal.js / Impress.js / deck.js (or any keyboard-navigable deck):
        #      Navigates with ArrowRight, screenshots viewport, stops when it loops.
        #   3. Fallback: full-page viewport screenshot (single frame).
        #
        # Saves slide-1.png … slide-N.png to {{run_dir}}/pixel_slides/.
        # Writes {{run_dir}}/html_extract.json with slide count + metadata.
        # No-op when html_input is empty.
        type: bash
        timeout: 120
        command: |
          .venv/bin/python -c "
          import json, sys, hashlib
          from io import BytesIO
          from pathlib import Path

          run_dir    = Path('{{run_dir}}')
          html_input = '{{html_input}}'.strip()
          vlm_refine_enabled = '{{vlm_refine}}'.strip().lower() in ('true', '1', 'yes', 'on')

          if not html_input:
              print('No HTML input - skipping')
              sys.exit(0)

          from playwright.sync_api import sync_playwright
          from PIL import Image

          # ── Optional VLM refinement for Strategy 2 ────────────────────────────
          # When vlm_refine is enabled, after the overflow-based ladder search
          # picks a viewport, we ask a vision model whether the slide still
          # looks cramped or small at that size — and bump it up one ladder
          # step if so. This catches the "fits but visually packed" case that
          # a pure overflow probe misses (flex layouts can shrink content to
          # fit without setting scrollHeight > clientHeight).
          #
          # Capped at one bump per slide (one VLM call per slide). Requires
          # the openai package + OPENAI_API_KEY at recipe runtime.
          def _vlm_cramped_check(png_bytes, slide_num):
              """Ask OpenAI Vision if this slide is hard to read. Returns
              'cramped', 'small', 'good', or '' on error/skip."""
              try:
                  import base64
                  import openai
                  client = openai.OpenAI()
                  b64 = base64.b64encode(png_bytes).decode()
                  resp = client.chat.completions.create(
                      model='gpt-4o-mini',
                      messages=[{
                          'role': 'user',
                          'content': [
                              {'type': 'text', 'text':
                                  'You are evaluating a single slide from a business '
                                  'presentation rendered for projection. Is the text on '
                                  'this slide hard to read at presentation distance '
                                  'because (a) the font is too small relative to the '
                                  'canvas, or (b) the layout is too cramped (elements '
                                  'crowded together with insufficient whitespace)? '
                                  'Reply with exactly one word: "cramped", "small", '
                                  'or "good".'
                              },
                              {'type': 'image_url', 'image_url': {
                                  'url': f'data:image/png;base64,{b64}',
                              }},
                          ],
                      }],
                      max_tokens=10,
                      temperature=0.0,
                  )
                  return (resp.choices[0].message.content or '').strip().lower()
              except Exception as exc:
                  print(f'  VLM check failed for slide {slide_num}: {exc} — keeping current viewport')
                  return ''

          # Resolve to absolute path (handle both file paths and URLs)
          if html_input.startswith('http://') or html_input.startswith('https://'):
              url = html_input
          else:
              p = Path(html_input).resolve()
              if not p.exists():
                  print(f'ERROR: {p} not found')
                  sys.exit(1)
              url = f'file://{p}'

          px_dir = run_dir / 'pixel_slides'
          px_dir.mkdir(parents=True, exist_ok=True)

          W, H = 1536, 864
          captured = 0

          with sync_playwright() as pw:
              browser = pw.chromium.launch()
              page    = browser.new_page()
              page.set_viewport_size({'width': W, 'height': H})
              page.goto(url, wait_until='networkidle')
              page.wait_for_timeout(2000)

              # ── Strategy 1: Director Deck element IDs (#slide-1, #slide-2, …)
              n = 1
              while True:
                  elem = page.query_selector(f'#slide-{n}')
                  if not elem:
                      break
                  # Scroll element into view and screenshot just that bounding box
                  elem.scroll_into_view_if_needed()
                  page.wait_for_timeout(300)
                  bb = elem.bounding_box()
                  if bb:
                      img_bytes = page.screenshot(clip={'x': bb['x'], 'y': bb['y'],
                                                        'width': bb['width'], 'height': bb['height']})
                  else:
                      img_bytes = page.screenshot()
                  out = px_dir / f'slide-{n}.png'
                  out.write_bytes(img_bytes)
                  print(f'  slide-{n}.png (element #slide-{n})')
                  captured = n
                  n += 1

              # ── Strategy 2: Keyboard-navigable deck (Reveal.js, Impress.js, etc.)
              #
              # Strategy 2 renders arbitrary HTML decks (Reveal.js, Impress.js,
              # generic .slide.active toggles, etc.) where:
              #
              #   * Body text is typically fixed-px (e.g. 18px) and titles use
              #     clamp(...vw, Npx) — so fonts occupy a SMALLER fraction of
              #     canvas at a LARGER viewport. The default 1536×864 produces
              #     "too small with too much empty space" output on dense decks.
              #
              #   * Different slides need different viewports — a sparse hero
              #     fits at 1280×720 (biggest text); a dense risk slide may
              #     need to bump up the ladder before its content fits.
              #
              # Algorithm: for each slide, linear-search the viewport ladder
              # for the smallest viewport where the slide's active element
              # doesn't overflow. Render at that viewport with DSF=2 for crisp
              # serif rendering. Pillow-LANCZOS-downscale to W×H for output.
              #
              # We close + relaunch the browser with a new context (DSF=2)
              # before entering Strategy 2 so Strategy 1 keeps its existing
              # behaviour (element-bounding-box screenshots at DSF=1).
              if captured == 0:
                  browser.close()
                  browser = pw.chromium.launch()
                  NAV_LADDER = [
                      (1280, 720),  (1408, 792),  (1536, 864),  (1664, 936),
                      (1792, 1008), (1920, 1080), (2048, 1152), (2176, 1224),
                      (2304, 1296), (2432, 1368), (2560, 1440),
                  ]
                  ctx = browser.new_context(
                      viewport={'width': NAV_LADDER[0][0], 'height': NAV_LADDER[0][1]},
                      device_scale_factor=2,
                  )
                  page = ctx.new_page()
                  page.goto(url, wait_until='networkidle')
                  page.wait_for_timeout(2000)

                  OVERFLOW_PROBE = (
                      "(() => {"
                      "  const sels = ['.slide.active','.present','section.active',"
                      "                '.reveal section.present','.impress-on-active'];"
                      "  for (const s of sels) {"
                      "    const el = document.querySelector(s);"
                      "    if (el) return el.scrollHeight - el.clientHeight;"
                      "  }"
                      "  return document.body.scrollHeight - document.body.clientHeight;"
                      "})()"
                  )

                  def navigate_to(n_one_based):
                      """Home + ArrowRight × (n-1) — fresh navigation from start."""
                      page.keyboard.press('Home')
                      page.wait_for_timeout(500)
                      for _ in range(n_one_based - 1):
                          page.keyboard.press('ArrowRight')
                          page.wait_for_timeout(400)

                  seen_hashes    = []
                  viewports_used = []
                  slide_num      = 1

                  while slide_num <= 100:
                      # ── Ladder search: smallest viewport where this slide fits
                      chosen_w, chosen_h = NAV_LADDER[-1]
                      for cand_w, cand_h in NAV_LADDER:
                          page.set_viewport_size({'width': cand_w, 'height': cand_h})
                          page.wait_for_timeout(250)
                          navigate_to(slide_num)
                          try:
                              overflow_y = page.evaluate(OVERFLOW_PROBE)
                          except Exception:
                              overflow_y = 0
                          if overflow_y is None or overflow_y <= 4:
                              chosen_w, chosen_h = cand_w, cand_h
                              break

                      # ── Optional VLM refinement (single bump per slide max)
                      # The overflow probe says "fits" when scrollHeight ≤ clientHeight,
                      # but flex layouts can SHRINK content to fit (no overflow, but
                      # visually cramped). The VLM catches this case. Only runs when
                      # vlm_refine is enabled and we're not already at top of ladder.
                      if vlm_refine_enabled:
                          current_idx = NAV_LADDER.index((chosen_w, chosen_h))
                          if current_idx < len(NAV_LADDER) - 1:
                              preview = page.screenshot()
                              verdict = _vlm_cramped_check(preview, slide_num)
                              if verdict in ('cramped', 'small'):
                                  current_idx += 1
                                  chosen_w, chosen_h = NAV_LADDER[current_idx]
                                  page.set_viewport_size({'width': chosen_w, 'height': chosen_h})
                                  page.wait_for_timeout(250)
                                  navigate_to(slide_num)
                                  print(f'  VLM: slide {slide_num} rated "{verdict}" → bumped to {chosen_w}×{chosen_h}')

                      # ── Capture at chosen viewport (native pixels: chosen × 2 via DSF)
                      img_bytes = page.screenshot()
                      hsh = hashlib.md5(img_bytes).hexdigest()

                      # Loop detection — bail if we've seen this exact frame before
                      if hsh in seen_hashes and slide_num > 2:
                          print(f'  Detected loop at slide {slide_num} — stopping')
                          break

                      # ── Downscale to target W × H via Pillow LANCZOS
                      img = Image.open(BytesIO(img_bytes))
                      if img.size != (W, H):
                          img = img.resize((W, H), Image.LANCZOS)
                      out = px_dir / f'slide-{slide_num}.png'
                      img.save(out, 'PNG', optimize=True)

                      seen_hashes.append(hsh)
                      viewports_used.append((slide_num, chosen_w, chosen_h))
                      print(f'  slide-{slide_num}.png (viewport {chosen_w}×{chosen_h}, DSF=2)')
                      captured = slide_num

                      # ── Advance and check for end-of-deck (at chosen viewport)
                      page.keyboard.press('ArrowRight')
                      page.wait_for_timeout(500)
                      next_bytes = page.screenshot()
                      if hashlib.md5(next_bytes).hexdigest() == hsh:
                          print(f'  No change after ArrowRight — end of deck')
                          break

                      slide_num += 1

                  # Summary of viewports used (helpful for diagnosing overfit decks)
                  if viewports_used:
                      uniq_v = sorted(set((vw, vh) for _, vw, vh in viewports_used))
                      print(f'  Viewports used: {uniq_v}')

              browser.close()

          # ── DOM text extraction (avoids needing vision in write-content)
          dom_slides = []
          css_vars   = {}

          if not html_input.startswith('http://') and not html_input.startswith('https://'):
              try:
                  import re as _re
                  src = Path(html_input).read_text(encoding='utf-8')

                  # CSS design tokens (colors, fonts)
                  for m in _re.finditer(r'--([\w-]+)\s*:\s*([^;]+);', src):
                      css_vars[m.group(1)] = m.group(2).strip()

                  # Pattern 1: data-slide=N  (e.g. <section data-slide="3">)
                  # Use .(\d+). to match any quote char without inline quote escaping
                  pat = _re.compile(
                      r'data-slide=.(\d+).[^>]*>(.*?)</section',
                      _re.DOTALL | _re.IGNORECASE)
                  for num, body in pat.findall(src):
                      text = _re.sub(r'<[^>]+>', ' ', body)
                      text = _re.sub(r'\s+', ' ', text).strip()
                      if text:
                          dom_slides.append({'id': int(num), 'text': text})

                  # Pattern 2: id=slide-N  (Director Deck wireframe format)
                  if not dom_slides:
                      pat2 = _re.compile(
                          r'id=.slide-(\d+).[^>]*>(.*?)</(?:section|div)',
                          _re.DOTALL | _re.IGNORECASE)
                      for num, body in pat2.findall(src):
                          text = _re.sub(r'<[^>]+>', ' ', body)
                          text = _re.sub(r'\s+', ' ', text).strip()
                          if text:
                              dom_slides.append({'id': int(num), 'text': text})

                  dom_slides.sort(key=lambda s: s['id'])
                  print(f'DOM extraction: {len(dom_slides)} slides, {len(css_vars)} CSS vars')
              except Exception as ex:
                  print(f'DOM extraction failed: {ex}')

          meta = {
              'source':       html_input,
              'url':          url,
              'slide_count':  captured,
              'dom_extraction': 'success' if dom_slides else 'not_available',
              'css_vars':     css_vars,
              'slides_text':  dom_slides,
          }
          out_json = run_dir / 'html_extract.json'
          out_json.write_text(json.dumps(meta, indent=2, ensure_ascii=False))
          print(f'Captured {captured} slides -> {px_dir}')
          print(f'Metadata + DOM text -> {out_json}')
          "

