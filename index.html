<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Joy of Hong Kong Milk Tea</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  width: 100vw; height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: none;
}

/* ── Locked 16:9 canvas ─────────────────────────────────────────────────────
 * ALL layers live here. Width/height set by CSS so JS never needs to
 * measure or resize anything.
 */
#canvas {
  position: relative;
  width:  min(100vw, 100vh * (16/9));
  height: min(100vh, 100vw * (9/16));
  background: #000;
  overflow: hidden;
  flex-shrink: 0;
}

/* Every child fills the canvas pixel-perfectly */
.layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* ── Slides ──────────────────────────────────────────────────────────────────
 * ALL slides are always display:block and in the stacking order.
 * Visibility is controlled only via opacity so the compositor never
 * has to re-layout when we switch — zero repaint cost.
 * NO CSS opacity transition here — we control timing in JS.
 */
.slide {
  opacity: 0;
  z-index: 1;
}
.slide.active {
  opacity: 1;
}
.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* ── Transition video ────────────────────────────────────────────────────────
 * Sits above all slides (z-index 2). Controlled entirely by JS opacity.
 * background: transparent — no black canvas painted when opacity is 0.
 *
 * THE KEY INSIGHT: Veo first frame = current slide image.
 *                  Veo last frame  = next slide image.
 * So showing the video at opacity:0 → opacity:1 is visually seamless
 * (first frame matches what's already on screen), and hiding it after
 * onended is also seamless (last frame matches the slide we just made active).
 */
#trans-video {
  object-fit: cover;
  opacity: 0;
  z-index: 2;
  background: transparent;
}

/* ── UI chrome ───────────────────────────────────────────────────────────── */
#counter {
  position: fixed;
  bottom: 18px; right: 20px;
  color: rgba(255,255,255,0.35);
  font: 12px/1 sans-serif;
  letter-spacing: 0.07em;
  z-index: 100;
  pointer-events: none;
}

#dots {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 8px;
  z-index: 100;
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  cursor: pointer;
  transition: background .25s, transform .25s;
}
.dot.active { background: #D4860A; transform: scale(1.35); }
.dot:hover  { background: rgba(255,255,255,0.55); }

.nav-btn {
  position: fixed; top: 50%;
  transform: translateY(-50%);
  width: 44px; height: 72px;
  background: rgba(255,255,255,0.07);
  border: none; color: rgba(255,255,255,0.5);
  font-size: 22px; cursor: pointer;
  opacity: 0; transition: opacity .25s, background .2s;
  z-index: 100; border-radius: 4px;
}
body:hover .nav-btn { opacity: 1; }
.nav-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
.nav-btn:disabled { opacity: 0 !important; }
#btn-prev { left: 10px; }
#btn-next { right: 10px; }

#skip-hint {
  position: fixed;
  bottom: 48px; left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.35);
  font: 11px/1 sans-serif;
  letter-spacing: .12em;
  text-transform: uppercase;
  opacity: 0; transition: opacity .3s;
  z-index: 100; pointer-events: none;
}
#skip-hint.show { opacity: 1; }

#cursor {
  position: fixed;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #D4860A;
  opacity: .7;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%,-50%);
  transition: width .12s, height .12s;
}
</style>
</head>
<body>

<div id="cursor"></div>

<!-- ── 16:9 locked canvas ─────────────────────────────────────────────────
     All slides AND the video are children of this single box.
     They share the IDENTICAL bounding rect — zero dimension gap possible.
-->
<div id="canvas">
  <!-- Slides: all display:block, opacity controls which is visible -->
  <div class="layer slide active" id="s1" ><img src="pixel_slides/slide-1.png"  alt=""></div>
  <div class="layer slide"        id="s2" ><img src="pixel_slides/slide-2.png"  alt=""></div>
  <div class="layer slide"        id="s3" ><img src="pixel_slides/slide-3.png"  alt=""></div>
  <div class="layer slide"        id="s4" ><img src="pixel_slides/slide-4.png"  alt=""></div>
  <div class="layer slide"        id="s5" ><img src="pixel_slides/slide-5.png"  alt=""></div>
  <div class="layer slide"        id="s6" ><img src="pixel_slides/slide-6.png"  alt=""></div>
  <div class="layer slide"        id="s7" ><img src="pixel_slides/slide-7.png"  alt=""></div>
  <div class="layer slide"        id="s8" ><img src="pixel_slides/slide-8.png"  alt=""></div>
  <div class="layer slide"        id="s9" ><img src="pixel_slides/slide-9.png"  alt=""></div>
  <div class="layer slide"        id="s10"><img src="pixel_slides/slide-10.png" alt=""></div>

  <!--
    Transition video: z-index 2, always in DOM, opacity:0 when idle.
    preload="auto" so the browser buffers the NEXT transition
    as soon as we set the src (happens right after each slide shows).
  -->
  <video id="trans-video" class="layer" playsinline preload="auto"></video>
</div>

<div id="dots"></div>
<div id="counter">1 / 10</div>
<div id="skip-hint">space · → to skip</div>
<button class="nav-btn" id="btn-prev">&#8249;</button>
<button class="nav-btn" id="btn-next">&#8250;</button>

<script>
'use strict';

const TOTAL   = 10;
const videoEl = document.getElementById('trans-video');
const hint    = document.getElementById('skip-hint');
const counter = document.getElementById('counter');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const cursor  = document.getElementById('cursor');

let cur  = 1;
let busy = false;

// ── Build progress dots ─────────────────────────────────────────────────────
const dotsEl = document.getElementById('dots');
for (let i = 1; i <= TOTAL; i++) {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 1 ? ' active' : '');
  d.dataset.n = i;
  d.addEventListener('click', () => { if (!busy) jumpTo(+d.dataset.n); });
  dotsEl.appendChild(d);
}

function updateUI() {
  counter.textContent = cur + ' / ' + TOTAL;
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i + 1 === cur);
  });
  btnPrev.disabled = (cur <= 1);
  btnNext.disabled = (cur >= TOTAL);
}

// ── Slide switch (instant, no transition) ───────────────────────────────────
function showSlide(n) {
  document.getElementById('s' + cur).classList.remove('active');
  cur = n;
  document.getElementById('s' + cur).classList.add('active');
  updateUI();
}

// ── Preload: set video src immediately so browser buffers while user reads ──
// Called right after showing each slide. If the video is already cached
// (from a previous prefetch or same src), readyState will be ≥ 2 instantly.
function bufferNext(from, to) {
  if (from < 1 || to > TOTAL) return;
  const src = videoSrc(from, to);
  if (!videoEl.src.endsWith(src)) {          // avoid re-loading if already set
    videoEl.src = src;                        // preload="auto" → browser buffers
    videoEl.load();
  }
}

function videoSrc(from, to) {
  return `transitions/slide-${from}-to-${to}.mp4`;
}

// ── Core: play transition with NO black frame at start or end ───────────────
//
// WHY THIS WORKS:
//   Veo interpolation: first frame = slide N image, last frame = slide N+1 image.
//
//   START: We keep slide N visible (opacity:1) while the video loads in the
//          background (opacity:0). When canplay fires, frame 0 is decoded and
//          matches slide N exactly. We set opacity:1 on the video — visually
//          nothing changes because the first frame IS the current slide.
//          Then we play. Zero black.
//
//   END:   onended fires. Video's last frame is still on screen (= slide N+1).
//          We immediately set slide N+1 active (opacity:1) — it's beneath the
//          video but identical to what's showing. After 2 rAFs (ensuring the
//          browser has composited the slide), we set video opacity:0.
//          The slide N+1 takes over seamlessly. Zero black.
//
function playTransition(from, to, onDone) {
  busy = true;
  hint.classList.add('show');

  const src = videoSrc(from, to);

  // ── Clean up any previous state ────────────────────────────────────────
  videoEl.onended  = null;
  videoEl.onerror  = null;
  videoEl.oncanplay = null;

  // ── Error / missing file fallback ──────────────────────────────────────
  const onError = () => {
    cleanupVideo();
    showSlide(to);
    busy = false;
    bufferNext(to, to + 1);
  };

  // ── End of video: reveal next slide BEFORE hiding video ────────────────
  videoEl.onended = () => {
    // 1. Make next slide active (underneath video — same pixels as last frame)
    showSlide(to);

    // 2. After two paint cycles: fade out video, reveal the slide beneath
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        cleanupVideo();
        busy = false;
        bufferNext(to, to + 1);
        onDone();
      });
    });
  };

  videoEl.onerror = onError;

  // ── Load and show video only when first frame is ready ─────────────────
  const startWhenReady = () => {
    // readyState 2+ = HAVE_CURRENT_DATA (frame 0 decoded)
    // Frame 0 = slide N image → showing video now is invisible to the eye
    videoEl.style.opacity = '1';
    videoEl.play().catch(onError);
  };

  if (!videoEl.src.endsWith(src)) {
    videoEl.src = src;    // wasn't pre-buffered; set src now
  }

  videoEl.style.opacity = '0';  // keep invisible until first frame ready

  if (videoEl.readyState >= 2) {
    // Already buffered (preload worked) — show immediately, no flash
    startWhenReady();
  } else {
    videoEl.oncanplay = () => {
      videoEl.oncanplay = null;
      startWhenReady();
    };
    if (videoEl.readyState === 0) videoEl.load();  // trigger load if needed
  }
}

function cleanupVideo() {
  videoEl.style.opacity = '0';
  videoEl.onended  = null;
  videoEl.onerror  = null;
  videoEl.oncanplay = null;
}

// ── Skip: show next slide immediately, clean up video ──────────────────────
function skip(targetSlide) {
  if (!busy) return;
  videoEl.pause();
  cleanupVideo();
  hint.classList.remove('show');
  busy = false;
  if (targetSlide != null) {
    showSlide(targetSlide);
    bufferNext(targetSlide, targetSlide + 1);
  }
}

// ── Navigation ──────────────────────────────────────────────────────────────
function advance() {
  if (busy)        { skip(cur + 1); return; }
  if (cur >= TOTAL) return;
  const next = cur + 1;
  playTransition(cur, next, () => { /* slide already set in onended */ });
}

function retreat() {
  if (busy) { skip(cur); return; }   // skip → stay on current slide
  if (cur <= 1) return;
  showSlide(cur - 1);
  bufferNext(cur - 1, cur);
}

function jumpTo(n) {
  if (n === cur || n < 1 || n > TOTAL) return;
  if (busy) skip(n);
  else { showSlide(n); bufferNext(n, n + 1); }
}

// ── Input handling ───────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const fwd = e.key === 'ArrowRight' || e.key === ' ' || e.key === 'ArrowDown';
  const bck = e.key === 'ArrowLeft'  || e.key === 'ArrowUp';
  if (fwd) { e.preventDefault(); advance(); }
  if (bck) { e.preventDefault(); retreat(); }
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  }
});

document.getElementById('canvas').addEventListener('click', advance);
btnPrev.addEventListener('click', e => { e.stopPropagation(); retreat(); });
btnNext.addEventListener('click', e => { e.stopPropagation(); advance(); });

// ── Cursor ───────────────────────────────────────────────────────────────────
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});
document.addEventListener('mousedown', () => { cursor.style.width = cursor.style.height = '15px'; });
document.addEventListener('mouseup',   () => { cursor.style.width = cursor.style.height = '9px'; });

// ── Init ─────────────────────────────────────────────────────────────────────
updateUI();
bufferNext(1, 2);   // start buffering first transition immediately
</script>
</body>
</html>
